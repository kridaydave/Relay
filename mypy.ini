[mypy]
python_version = 3.12
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
disallow_any_expr = True
disallow_any_decorated = True
disallow_any_generics = True
disallow_subclassing_any = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
follow_imports = normal
ignore_missing_imports = False

# Optional dependencies — no type stubs available
[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

# Optional runner dependencies — imported lazily, no type stubs available
[mypy-crewai.*]
ignore_missing_imports = True

[mypy-autogen.*]
ignore_missing_imports = True

[mypy-langchain-core.*]
ignore_missing_imports = True

# token_counter interfaces with tiktoken (no type stubs).
# Calls to tiktoken produce unavoidable Any; the cast wrappers
# restore type safety at the function boundary for callers.
[mypy-relay.budget.token_counter]
disallow_any_expr = False

# Local adapter uses httpx mock protocol types; harmless Any from cast boundaries.
[mypy-relay.runners.local_model]
disallow_any_expr = False
